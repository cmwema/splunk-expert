name: Update Docs & Wiki

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Generate and push wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/cmwema/splunk-expert.wiki.git" wiki
          cd wiki

          # ── Home.md ──────────────────────────────────────────────────────────
          VERSION=$(grep '"version"' ../.claude-plugin/plugin.json | grep -o '[0-9.]*')
          SKILL_COUNT=$(ls ../skills | wc -l | tr -d ' ')

          cat > Home.md <<WIKI
          # splunk-expert · Claude Code Plugin

          > **$SKILL_COUNT focused Splunk skills. Zero token bloat.**
          > Each skill is a thin router — only the relevant guidance loads per task.

          **Version:** $VERSION | **Target:** Splunk Enterprise 9.x | **License:** MIT

          ---

          ## Install

          \`\`\`
          /plugin marketplace add cmwema/splunk-expert
          /plugin install splunk-expert@splunk-expert-marketplace
          /reload-plugins
          \`\`\`

          ## Usage

          Skills auto-trigger from context. Explicit invocation:

          \`\`\`
          /splunk-expert:splunk-spl
          /splunk-expert:splunk-hec
          /splunk-expert:splunk-itsi
          \`\`\`

          ---

          ## Skills ($SKILL_COUNT total)

          | Skill | One-line description |
          |-------|----------------------|
          WIKI

          # Append skill rows from each SKILL.md frontmatter
          for skill_dir in $(ls -d ../skills/*/); do
            skill_name=$(basename "$skill_dir")
            # Extract description: collapse multi-line YAML >- block until next key or ---
            desc=$(awk '
              /^description:/ { found=1; next }
              found && /^  / { line=$0; sub(/^  /, "", line); printf "%s ", line; next }
              found { exit }
            ' "${skill_dir}SKILL.md" | sed "s/  */ /g" | sed "s/^ //;s/ $//")
            # Trim to first sentence (up to first period or 120 chars)
            short=$(echo "$desc" | sed 's/\. .*//' | cut -c1-120)
            echo "| \`$skill_name\` | $short |" >> Home.md
          done

          cat >> Home.md <<WIKI

          ---

          ## Structure

          \`\`\`
          splunk-expert/
          ├── .claude-plugin/plugin.json
          ├── skills/<skill-name>/
          │   ├── SKILL.md          ← thin router (triggers + conventions)
          │   └── references/*.md   ← detailed guidance, loaded on demand
          └── docs/index.html       ← GitHub Pages site
          \`\`\`

          ---

          *Auto-generated on every push to \`main\`. Do not edit directly.*
          WIKI

          # ── Skills-Reference.md ──────────────────────────────────────────────
          cat > Skills-Reference.md <<WIKI
          # Skills Reference

          Full routing tables, conventions, and output format for every skill.
          Auto-generated from \`skills/*/SKILL.md\` — version $VERSION.

          ---

          WIKI

          for skill_dir in $(ls -d ../skills/*/); do
            skill_name=$(basename "$skill_dir")
            echo "## $skill_name" >> Skills-Reference.md
            echo "" >> Skills-Reference.md
            # Strip YAML frontmatter (between --- delimiters) then append body
            awk '/^---/{n++; next} n>=2' "${skill_dir}SKILL.md" >> Skills-Reference.md
            echo "" >> Skills-Reference.md
            echo "---" >> Skills-Reference.md
            echo "" >> Skills-Reference.md
          done

          echo "*Auto-generated — do not edit directly.*" >> Skills-Reference.md

          # ── Commit & push ────────────────────────────────────────────────────
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Home.md Skills-Reference.md
          git diff --cached --quiet || git commit -m "docs: auto-update wiki → v${VERSION}"
          git push
